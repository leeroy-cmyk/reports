name: Refresh QBTime and Ramp

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch QBTime and Ramp data
        env:
          QBT_TOKEN: ${{ secrets.QBT_TOKEN }}
          RAMP_CLIENT_ID: ${{ secrets.RAMP_CLIENT_ID }}
          RAMP_CLIENT_SECRET: ${{ secrets.RAMP_CLIENT_SECRET }}
          FETCH_ONLY: qbt-ramp
        run: node scripts/fetch-data.js

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: refresh QBTime+Ramp data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
