name: Refresh AppFolio Data

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes (GitHub minimum)
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch AppFolio data
        env:
          AF_USERNAME: ${{ secrets.AF_USERNAME }}
          AF_PASSWORD: ${{ secrets.AF_PASSWORD }}
          FIREBASE_EMAIL:    ${{ secrets.FIREBASE_EMAIL }}
          FIREBASE_PASSWORD: ${{ secrets.FIREBASE_PASSWORD }}
          FETCH_ONLY: appfolio
        run: node scripts/fetch-data.js

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh AppFolio data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
