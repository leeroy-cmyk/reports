name: Refresh AppFolio Data

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes (GitHub minimum)
  workflow_dispatch:          # manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch data from AppFolio
        env:
          AF_USERNAME: ${{ secrets.AF_USERNAME }}
          AF_PASSWORD: ${{ secrets.AF_PASSWORD }}
          QBT_TOKEN: ${{ secrets.QBT_TOKEN }}
          RAMP_CLIENT_ID: ${{ secrets.RAMP_CLIENT_ID }}
          RAMP_CLIENT_SECRET: ${{ secrets.RAMP_CLIENT_SECRET }}
        run: node scripts/fetch-data.js

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: refresh AppFolio data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
