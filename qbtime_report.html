<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labor & Time Report — McKay Property Management</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f4f6f9; color: #1a2535; line-height: 1.5; min-height: 100vh; }

  .header { background: #ffffff; border-bottom: 1px solid #d0dce8; padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header h1 { font-size: 20px; font-weight: 800; color: #1a2535; letter-spacing: -0.5px; }
  .header .sub { color: #7f8fa4; font-size: 12px; margin-top: 3px; }
  .header-right { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .badge-total { background: #d6eaf8; color: #1a5276; padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; }
  .as-of { color: #95a5a6; font-size: 11px; }
  .btn-refresh { background: #1a5276; color: #fff; border: none; padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.15s; }
  .btn-refresh:hover { background: #2e86c1; }
  .btn-refresh:disabled { background: #d0dce8; color: #95a5a6; cursor: not-allowed; }
  .spin { display: inline-block; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-overlay { position: fixed; inset: 0; background: rgba(244,246,249,0.92); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; gap: 16px; }
  .loading-overlay.hidden { display: none; }
  .loading-text { color: #1a5276; font-size: 16px; font-weight: 600; }
  .loading-spinner { width: 48px; height: 48px; border: 4px solid #d0dce8; border-top-color: #2e86c1; border-radius: 50%; animation: spin 0.8s linear infinite; }

  .error-bar { background: #fdf2f2; border: 1px solid #e8b4b4; color: #922b21; padding: 12px 20px; margin: 16px 32px; border-radius: 8px; font-size: 13px; display: none; }
  .error-bar.show { display: block; }

  .container { max-width: 1500px; margin: 0 auto; padding: 28px 32px; }

  .date-range-bar { background: #ffffff; border: 1px solid #d0dce8; border-radius: 10px; padding: 14px 20px; margin-bottom: 24px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .date-range-bar label { font-size: 12px; font-weight: 700; color: #7f8fa4; text-transform: uppercase; letter-spacing: 0.4px; }
  .date-range-bar input[type=date] { background: #f4f6f9; border: 1px solid #d0dce8; color: #1a2535; padding: 6px 10px; border-radius: 6px; font-size: 13px; outline: none; }
  .date-range-bar input[type=date]:focus { border-color: #2e86c1; }
  .range-btn { background: #f4f6f9; border: 1px solid #d0dce8; color: #1a5276; padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .range-btn:hover, .range-btn.active { background: #1a5276; color: #fff; border-color: #1a5276; }

  .cards { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; margin-bottom: 28px; }
  @media (max-width: 1100px) { .cards { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 600px) { .cards { grid-template-columns: repeat(2, 1fr); } }
  .card { background: #ffffff; border: 1px solid #d0dce8; border-radius: 12px; padding: 18px 16px; position: relative; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 12px 12px 0 0; }
  .card.c-blue::before { background: linear-gradient(90deg,#2e86c1,#5dade2); }
  .card.c-green::before { background: linear-gradient(90deg,#1e8449,#27ae60); }
  .card.c-orange::before { background: linear-gradient(90deg,#ca6f1e,#e67e22); }
  .card.c-purple::before { background: linear-gradient(90deg,#6c3483,#9b59b6); }
  .card.c-teal::before { background: linear-gradient(90deg,#117a65,#1abc9c); }
  .card.c-red::before { background: linear-gradient(90deg,#c0392b,#e74c3c); }
  .card-label { font-size: 10px; font-weight: 700; color: #7f8fa4; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
  .card-value { font-size: 28px; font-weight: 800; color: #1a2535; line-height: 1; }
  .card-sub { font-size: 11px; color: #95a5a6; margin-top: 5px; }

  .tabs { display: flex; gap: 2px; border-bottom: 1px solid #d0dce8; }
  .tab { padding: 10px 18px; cursor: pointer; font-size: 13px; font-weight: 600; color: #7f8fa4; border-radius: 8px 8px 0 0; transition: all 0.15s; border: 1px solid transparent; border-bottom: none; white-space: nowrap; }
  .tab:hover { color: #1a2535; background: #f4f6f9; }
  .tab.active { color: #1a5276; background: #ffffff; border-color: #d0dce8; border-bottom-color: #ffffff; margin-bottom: -1px; }
  .tab-content { display: none; background: #ffffff; border: 1px solid #d0dce8; border-top: none; border-radius: 0 8px 8px 8px; padding: 24px; }
  .tab-content.active { display: block; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #f4f6f9; color: #7f8fa4; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 12px; text-align: left; border-bottom: 1px solid #d0dce8; position: sticky; top: 0; z-index: 5; cursor: pointer; user-select: none; }
  th:hover { color: #2e86c1; }
  th.sort-asc::after { content: ' ↑'; color: #2e86c1; }
  th.sort-desc::after { content: ' ↓'; color: #2e86c1; }
  td { padding: 9px 12px; border-bottom: 1px solid #e8ecf0; vertical-align: middle; }
  tr:hover td { background: #f0f5fb; }

  .badge { padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: 700; white-space: nowrap; }
  .st-approved { background: #d5f5e3; color: #1e8449; }
  .st-submitted { background: #d6eaf8; color: #1a5276; }
  .st-pending { background: #fef9e7; color: #b7950b; }

  .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
  .filter-bar input, .filter-bar select { background: #ffffff; border: 1px solid #d0dce8; color: #1a2535; padding: 8px 12px; border-radius: 8px; font-size: 13px; outline: none; }
  .filter-bar input { flex: 1; min-width: 220px; }
  .filter-bar input:focus, .filter-bar select:focus { border-color: #2e86c1; }
  .results-count { font-size: 12px; color: #7f8fa4; margin-left: auto; font-weight: 600; }

  .table-wrapper { overflow-x: auto; max-height: 580px; overflow-y: auto; border: 1px solid #d0dce8; border-radius: 8px; }

  .chart-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .chart-row.two-col { grid-template-columns: 1fr 1fr; }
  @media (max-width: 900px) { .chart-row, .chart-row.two-col { grid-template-columns: 1fr; } }
  .mini-chart { background: #f8fafd; border: 1px solid #d0dce8; border-radius: 10px; padding: 18px; }
  .mini-chart h3 { font-size: 11px; font-weight: 700; color: #7f8fa4; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; }
  .bar-item { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .bar-label { font-size: 12px; color: #5d6d7e; width: 160px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar-fill { height: 14px; border-radius: 7px; min-width: 4px; transition: width 0.3s; }
  .bar-count { font-size: 12px; font-weight: 700; color: #1a2535; min-width: 50px; }
  .bar-pct { font-size: 11px; color: #7f8fa4; }

  .section-title { font-size: 12px; font-weight: 700; color: #1a5276; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid #d0dce8; }
</style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading QuickBooks Time data…</div>
</div>

<div class="header">
  <div>
    <h1>Labor & Time Report — McKay Property Management</h1>
    <div class="sub">QuickBooks Time · All employees · Last 365 days</div>
  </div>
  <div class="header-right">
    <span class="as-of" id="asOf">—</span>
    <span class="badge-total" id="badgeTotal">Loading…</span>
    <button class="btn-refresh" id="btnRefresh" onclick="loadData()">
      <span id="refreshIcon">↻</span> Refresh
    </button>
  </div>
</div>

<div id="errorBar" class="error-bar"></div>

<div class="container" id="mainContent" style="display:none">

  <div class="date-range-bar">
    <label>Date Range</label>
    <input type="date" id="dateFrom">
    <span style="color:#95a5a6;font-size:13px">to</span>
    <input type="date" id="dateTo">
    <button class="range-btn" onclick="setRange(7)">7d</button>
    <button class="range-btn" onclick="setRange(30)">30d</button>
    <button class="range-btn active" onclick="setRange(90)">90d</button>
    <button class="range-btn" onclick="setRange(365)">365d</button>
    <button class="range-btn" onclick="setRangeYTD()">YTD</button>
    <button class="btn-refresh" style="margin-left:auto" onclick="applyDateRange()">Apply</button>
  </div>

  <div class="cards" id="cards"></div>

  <div class="tabs">
    <div class="tab active" onclick="showTab('overview')">Overview</div>
    <div class="tab" onclick="showTab('byEmployee')">By Employee</div>
    <div class="tab" onclick="showTab('byProperty')">By Property</div>
    <div class="tab" onclick="showTab('byClass')">By Class</div>
    <div class="tab" onclick="showTab('detail')">Full Detail</div>
  </div>

  <div class="tab-content active" id="tab-overview">
    <div class="chart-row" id="overviewCharts"></div>
  </div>

  <div class="tab-content" id="tab-byEmployee">
    <div class="section-title">Hours & Labor Cost by Employee</div>
    <div class="table-wrapper"><table id="empTable"></table></div>
  </div>

  <div class="tab-content" id="tab-byProperty">
    <div class="chart-row two-col" id="propCharts"></div>
    <div class="section-title">Hours by Property</div>
    <div class="table-wrapper"><table id="propTable"></table></div>
  </div>

  <div class="tab-content" id="tab-byClass">
    <div class="chart-row two-col" id="classCharts"></div>
    <div class="section-title">Hours by Class</div>
    <div class="table-wrapper"><table id="classTable"></table></div>
  </div>

  <div class="tab-content" id="tab-detail">
    <div class="filter-bar">
      <input type="text" id="searchInput" placeholder="Search employee, property, class, notes, WO#…" oninput="applyFilters()">
      <select id="filterEmployee" onchange="applyFilters()"><option value="">All Employees</option></select>
      <select id="filterClass" onchange="applyFilters()"><option value="">All Classes</option></select>
      <select id="filterState" onchange="applyFilters()"><option value="">All States</option></select>
      <span class="results-count" id="resultsCount"></span>
    </div>
    <div class="table-wrapper"><table id="detailTable"></table></div>
  </div>

</div>

<script>
let RAW = null;
let FILTERED = [];
let detailSort = { col: 'date', dir: 'desc' };

const CF_CLASS = '25056';
const CF_PROP  = '25068';
const CF_SVC   = '25054';
const CF_MILES = '25250';
const CF_BILL  = '25070';
const CF_WO    = '2748416';

function showTab(id) {
  const tabs = ['overview','byEmployee','byProperty','byClass','detail'];
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', tabs[i] === id));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
}

function fmtHours(sec) { return (sec / 3600).toFixed(1) + 'h'; }
function fmtCost(n) { return '$' + n.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0}); }

function cfItemName(cfItems, cfId, rawVal) {
  if (!rawVal) return '';
  // rawVal might be "name" or "id:name" — return as-is since QBT returns name strings
  return rawVal;
}

function stClass(s) {
  if (!s) return '';
  const l = s.toUpperCase();
  if (l === 'APPROVED') return 'st-approved';
  if (l === 'SUBMITTED') return 'st-submitted';
  return 'st-pending';
}

function setRange(days) {
  const to = new Date();
  const from = new Date(Date.now() - days * 86400000);
  document.getElementById('dateFrom').value = from.toISOString().slice(0,10);
  document.getElementById('dateTo').value = to.toISOString().slice(0,10);
  document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  applyDateRange();
}

function setRangeYTD() {
  const now = new Date();
  document.getElementById('dateFrom').value = now.getFullYear() + '-01-01';
  document.getElementById('dateTo').value = now.toISOString().slice(0,10);
  document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  applyDateRange();
}

function applyDateRange() {
  if (!RAW) return;
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;
  render(RAW, from, to);
}

function barChart(title, entries, color, totalSec, fmt) {
  const max = entries[0]?.[1] || 1;
  const rows = entries.slice(0, 14).map(([label, val]) => `
    <div class="bar-item">
      <div class="bar-label" title="${label}">${label}</div>
      <div class="bar-fill" style="width:${Math.round(val/max*200)}px;background:${color}"></div>
      <div class="bar-count">${fmt(val)}</div>
      <div class="bar-pct">${totalSec ? Math.round(val/totalSec*100)+'%' : ''}</div>
    </div>`).join('');
  return `<div class="mini-chart"><h3>${title}</h3>${rows}</div>`;
}

function makeTable(headers, rows) {
  const thead = '<thead><tr>' + headers.map(h =>
    `<th onclick="sortDetail('${h.key}')" class="${detailSort.col===h.key?'sort-'+detailSort.dir:''}">${h.label}</th>`
  ).join('') + '</tr></thead>';
  const tbody = '<tbody>' + rows.map(r =>
    `<tr>${headers.map(h => `<td>${r[h.key] ?? ''}</td>`).join('')}</tr>`
  ).join('') + '</tbody>';
  return thead + tbody;
}

function render(data, fromDate, toDate) {
  const { users, jobcodes, customfields, cfItems, timesheets } = data;

  // Filter by date range
  const sheets = Object.values(timesheets).filter(t => {
    if (fromDate && t.date < fromDate) return false;
    if (toDate && t.date > toDate) return false;
    return true;
  });

  const totalSec = sheets.reduce((s, t) => s + (t.duration || 0), 0);
  const totalHrs = totalSec / 3600;
  const approved = sheets.filter(t => t.state === 'APPROVED').length;

  // Compute cost: duration * pay_rate
  let totalCost = 0;
  sheets.forEach(t => {
    const u = users[t.user_id];
    const rate = u ? (u.pay_rate || 0) : 0;
    totalCost += (t.duration / 3600) * rate;
  });

  const uniqueEmps = new Set(sheets.map(t => t.user_id)).size;
  const avgHrsPerEmp = uniqueEmps ? totalHrs / uniqueEmps : 0;

  // HEADER
  document.getElementById('badgeTotal').textContent = totalHrs.toFixed(0) + ' hrs';
  document.getElementById('asOf').textContent = 'As of ' + new Date().toLocaleDateString('en-US', {year:'numeric',month:'short',day:'numeric'});

  // CARDS
  document.getElementById('cards').innerHTML = [
    {c:'c-blue',  label:'Total Hours',     val: totalHrs.toFixed(1) + 'h',   sub: sheets.length + ' timesheet entries'},
    {c:'c-green', label:'Est. Labor Cost', val: fmtCost(totalCost),           sub: 'Based on pay rates'},
    {c:'c-purple',label:'Active Employees',val: uniqueEmps,                   sub: 'In selected period'},
    {c:'c-teal',  label:'Avg Hrs / Employee', val: avgHrsPerEmp.toFixed(1)+'h', sub: 'In selected period'},
    {c:'c-orange',label:'Approved',        val: approved,                     sub: Math.round(approved/sheets.length*100)+'% of entries'},
    {c:'c-red',   label:'Pending / Other', val: sheets.length - approved,     sub: 'Not yet approved'},
  ].map(({c,label,val,sub}) =>
    `<div class="card ${c}"><div class="card-label">${label}</div><div class="card-value">${val}</div><div class="card-sub">${sub}</div></div>`
  ).join('');

  // BY EMPLOYEE
  const empMap = {};
  sheets.forEach(t => {
    const uid = t.user_id;
    const u = users[uid];
    const name = u ? u.display_name : 'User ' + uid;
    if (!empMap[uid]) empMap[uid] = { name, hrs: 0, cost: 0, entries: 0, payRate: u ? u.pay_rate : 0 };
    empMap[uid].hrs += t.duration / 3600;
    empMap[uid].cost += (t.duration / 3600) * (u ? u.pay_rate || 0 : 0);
    empMap[uid].entries++;
  });
  const empRows = Object.values(empMap).sort((a,b) => b.hrs - a.hrs);

  // BY CLASS
  const classMap = {};
  sheets.forEach(t => {
    const cls = t.customfields?.[CF_CLASS] || 'Unclassified';
    if (!classMap[cls]) classMap[cls] = { cls, hrs: 0, entries: 0 };
    classMap[cls].hrs += t.duration / 3600;
    classMap[cls].entries++;
  });
  const classRows = Object.values(classMap).sort((a,b) => b.hrs - a.hrs);

  // BY PROPERTY
  const propMap = {};
  sheets.forEach(t => {
    const prop = t.customfields?.[CF_PROP] || jobcodes[t.jobcode_id]?.name || 'Unknown';
    if (!propMap[prop]) propMap[prop] = { prop, hrs: 0, entries: 0 };
    propMap[prop].hrs += t.duration / 3600;
    propMap[prop].entries++;
  });
  const propRows = Object.values(propMap).sort((a,b) => b.hrs - a.hrs);

  // OVERVIEW CHARTS
  document.getElementById('overviewCharts').innerHTML =
    barChart('Hours by Employee', empRows.map(r => [r.name, r.hrs * 3600]), '#2e86c1', totalSec, fmtHours) +
    barChart('Hours by Class', classRows.map(r => [r.cls, r.hrs * 3600]), '#27ae60', totalSec, fmtHours) +
    barChart('Hours by Property', propRows.slice(0, 14).map(r => [r.prop, r.hrs * 3600]), '#8e44ad', totalSec, fmtHours);

  // EMPLOYEE TABLE
  document.getElementById('empTable').innerHTML = makeTable(
    [{key:'name',label:'Employee'},{key:'hrs',label:'Hours'},{key:'cost',label:'Est. Cost'},{key:'rate',label:'Pay Rate'},{key:'entries',label:'Entries'}],
    empRows.map(r => ({ name: r.name, hrs: r.hrs.toFixed(1) + 'h', cost: fmtCost(r.cost), rate: r.payRate ? '$'+r.payRate+'/hr' : '—', entries: r.entries }))
  );

  // PROPERTY CHARTS + TABLE
  document.getElementById('propCharts').innerHTML =
    barChart('Top Properties by Hours', propRows.slice(0,14).map(r=>[r.prop, r.hrs*3600]), '#8e44ad', totalSec, fmtHours) +
    barChart('Top Properties by Entries', propRows.slice(0,14).sort((a,b)=>b.entries-a.entries).map(r=>[r.prop,r.entries*3600/r.hrs > 0 ? r.entries : r.entries]), '#e67e22', null, v => v + ' entries');
  document.getElementById('propTable').innerHTML = makeTable(
    [{key:'prop',label:'Property/Unit'},{key:'hrs',label:'Hours'},{key:'entries',label:'Entries'},{key:'pct',label:'% of Total'}],
    propRows.map(r => ({ prop: r.prop, hrs: r.hrs.toFixed(1)+'h', entries: r.entries, pct: Math.round(r.hrs/totalHrs*100)+'%' }))
  );

  // CLASS CHARTS + TABLE
  document.getElementById('classCharts').innerHTML =
    barChart('Hours by Class', classRows.map(r=>[r.cls, r.hrs*3600]), '#27ae60', totalSec, fmtHours) +
    barChart('Entries by Class', classRows.sort((a,b)=>b.entries-a.entries).map(r=>[r.cls,r.entries]), '#1abc9c', null, v => v + ' entries');
  document.getElementById('classTable').innerHTML = makeTable(
    [{key:'cls',label:'Class'},{key:'hrs',label:'Hours'},{key:'entries',label:'Entries'},{key:'pct',label:'% of Total'}],
    classRows.sort((a,b)=>b.hrs-a.hrs).map(r => ({ cls: r.cls, hrs: r.hrs.toFixed(1)+'h', entries: r.entries, pct: Math.round(r.hrs/totalHrs*100)+'%' }))
  );

  // POPULATE FILTER DROPDOWNS
  const empSel = document.getElementById('filterEmployee');
  empSel.innerHTML = '<option value="">All Employees</option>' +
    empRows.map(r => `<option>${r.name}</option>`).join('');
  const clsSel = document.getElementById('filterClass');
  clsSel.innerHTML = '<option value="">All Classes</option>' +
    classRows.map(r => `<option>${r.cls}</option>`).join('');
  const stSel = document.getElementById('filterState');
  const states = [...new Set(sheets.map(t => t.state))].sort();
  stSel.innerHTML = '<option value="">All States</option>' + states.map(s => `<option>${s}</option>`).join('');

  FILTERED = sheets.map(t => {
    const u = users[t.user_id];
    return {
      ...t,
      _empName: u ? u.display_name : 'User ' + t.user_id,
      _payRate: u ? u.pay_rate || 0 : 0,
      _jobcodeName: jobcodes[t.jobcode_id]?.name || '',
      _class: t.customfields?.[CF_CLASS] || '',
      _prop: t.customfields?.[CF_PROP] || '',
      _svc: t.customfields?.[CF_SVC] || '',
      _miles: t.customfields?.[CF_MILES] || '',
      _bill: t.customfields?.[CF_BILL] || '',
      _wo: t.customfields?.[CF_WO] || '',
    };
  });

  sortAndRenderDetail();
  document.getElementById('mainContent').style.display = 'block';
}

function applyFilters() {
  if (!FILTERED.length) return;
  const search = (document.getElementById('searchInput').value || '').toLowerCase();
  const emp = document.getElementById('filterEmployee').value;
  const cls = document.getElementById('filterClass').value;
  const state = document.getElementById('filterState').value;

  let rows = FILTERED;
  if (emp) rows = rows.filter(t => t._empName === emp);
  if (cls) rows = rows.filter(t => t._class === cls);
  if (state) rows = rows.filter(t => t.state === state);
  if (search) rows = rows.filter(t => {
    const blob = [t._empName, t._prop, t._class, t._svc, t.notes, t._wo, t._jobcodeName].join(' ').toLowerCase();
    return blob.includes(search);
  });

  renderDetailTable(rows);
  document.getElementById('resultsCount').textContent = rows.length.toLocaleString() + ' of ' + FILTERED.length.toLocaleString() + ' entries';
}

function sortDetail(col) {
  if (detailSort.col === col) detailSort.dir = detailSort.dir === 'asc' ? 'desc' : 'asc';
  else { detailSort.col = col; detailSort.dir = 'asc'; }
  sortAndRenderDetail();
}

function sortAndRenderDetail() {
  applyFilters();
}

function renderDetailTable(rows) {
  const { col, dir } = detailSort;
  const sorted = [...rows].sort((a, b) => {
    let av = a[col] ?? '', bv = b[col] ?? '';
    if (col === 'duration') { av = a.duration; bv = b.duration; }
    if (typeof av === 'number') return dir === 'asc' ? av - bv : bv - av;
    return dir === 'asc' ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
  });

  const headers = [
    {key:'date',label:'Date'},{key:'_empName',label:'Employee'},
    {key:'_jobcodeName',label:'Jobcode'},{key:'_class',label:'Class'},
    {key:'_prop',label:'Property'},{key:'_svc',label:'Service Item'},
    {key:'duration',label:'Hours'},{key:'state',label:'State'},
    {key:'_wo',label:'WO #'},{key:'_miles',label:'Miles'},{key:'notes',label:'Notes'}
  ];
  const thead = '<thead><tr>' + headers.map(h =>
    `<th onclick="sortDetail('${h.key}')" class="${detailSort.col===h.key?'sort-'+detailSort.dir:''}">${h.label}</th>`
  ).join('') + '</tr></thead>';
  const tbody = '<tbody>' + sorted.map(t => `<tr>
    <td>${t.date}</td>
    <td>${t._empName}</td>
    <td>${t._jobcodeName}</td>
    <td>${t._class}</td>
    <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${t._prop}">${t._prop}</td>
    <td>${t._svc}</td>
    <td>${(t.duration/3600).toFixed(2)}h</td>
    <td><span class="badge ${stClass(t.state)}">${t.state}</span></td>
    <td>${t._wo}</td>
    <td>${t._miles}</td>
    <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${(t.notes||'').replace(/"/g,'&quot;')}">${t.notes||''}</td>
  </tr>`).join('') + '</tbody>';
  document.getElementById('detailTable').innerHTML = thead + tbody;
}

async function loadData() {
  const btn = document.getElementById('btnRefresh');
  const icon = document.getElementById('refreshIcon');
  const overlay = document.getElementById('loadingOverlay');
  const errBar = document.getElementById('errorBar');

  btn.disabled = true; icon.className = 'spin'; icon.textContent = '↻';
  overlay.classList.remove('hidden'); errBar.classList.remove('show');

  try {
    const res = await fetch('./data/qbtime.json');
    if (!res.ok) throw new Error('Server returned ' + res.status);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Unknown error');
    RAW = json;

    // Default to last 90 days
    const to = new Date().toISOString().slice(0,10);
    const from = new Date(Date.now() - 90 * 86400000).toISOString().slice(0,10);
    document.getElementById('dateFrom').value = from;
    document.getElementById('dateTo').value = to;

    render(json, from, to);
  } catch(e) {
    errBar.textContent = '⚠ Failed to load data: ' + e.message + ' — check GitHub Actions';
    errBar.classList.add('show');
    document.getElementById('mainContent').style.display = 'none';
  } finally {
    btn.disabled = false; icon.className = ''; icon.textContent = '↻';
    overlay.classList.add('hidden');
  }
}

loadData();
</script>
</body>
</html>
